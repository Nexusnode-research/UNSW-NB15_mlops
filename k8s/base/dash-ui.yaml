apiVersion: apps/v1
kind: Deployment
metadata:
  name: dash-ui
  namespace: ids
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dash-ui
  template:
    metadata:
      labels:
        app: dash-ui
    spec:
      containers:
        - name: ui
          image: unsw-nb15-mlops-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8050
          env:
            - name: IDS_API_URL
              value: "http://ids-api:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 8050
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dash-ui
  namespace: ids
spec:
  type: ClusterIP
  selector:
    app: dash-ui
  ports:
    - name: http
      port: 8050
      targetPort: 8050
