resources:
  - ../../base
  - ids-api-hpa.yaml

# Note: metrics-server patching is handled separately via:
#   kubectl apply -k k8s/system/metrics-server/
patches:
  - target:
      kind: Service
      name: dash-ui
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30050
  - target:
      kind: Deployment
      name: ids-api
    path: ids-api-resources.yaml
